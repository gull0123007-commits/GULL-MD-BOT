<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GULL-KHAN-MD | PAIR SYSTEM</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Rajdhani:wght@300;500;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

#videoBg { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; }
#videoBg.active { display: block; }
#videoBg video { width: 100%; height: 100%; object-fit: cover; opacity: 0.45; }

body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; font-family: 'Rajdhani', sans-serif; color: #fff; overflow-x: hidden; overflow-y: auto; padding: 30px 15px; position: relative; }

@keyframes rgbText { 0%{color:#ff5555}14%{color:#ffaa33}28%{color:#ffff66}42%{color:#66ff66}57%{color:#66ddff}71%{color:#6699ff}85%{color:#ff66ff}100%{color:#ff5555} }
@keyframes rgbBorder { 0%{border-color:#ff5555}14%{border-color:#ffaa33}28%{border-color:#ffff66}42%{border-color:#66ff66}57%{border-color:#66ddff}71%{border-color:#6699ff}85%{border-color:#ff66ff}100%{border-color:#ff5555} }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }
@keyframes spin { from{transform:rotate(0deg)}to{transform:rotate(360deg)} }
@keyframes glow { 0%,100%{ text-shadow: 0 0 6px currentColor; } 50%{ text-shadow: 0 0 18px currentColor, 0 0 30px currentColor; } }

.wrapper { width: 100%; max-width: 480px; display: flex; flex-direction: column; align-items: center; gap: 24px; position: relative; z-index: 10; }

.header { text-align: center; }
.logo-text { font-family: 'Orbitron', sans-serif; font-size: clamp(28px, 9vw, 48px); font-weight: 900; animation: rgbText 7s linear infinite; margin-bottom: 6px; }
.logo-sub { font-family: 'Orbitron', sans-serif; font-size: clamp(13px, 4vw, 18px); letter-spacing: 4px; animation: rgbText 7s linear infinite; animation-delay: -1.5s; }

@media (max-width: 480px) { .logo-text { font-size: 26px; } .box h3 { font-size: 22px; letter-spacing: 1px; } }

.box { width: 100%; padding: 32px 26px; background: rgba(0, 0, 0, 0.75); border: 4px solid #ff0000; animation: rgbBorder 4s linear infinite; text-align: center; overflow: hidden; border-radius: 12px; }

.box-icon { font-size: 40px; margin-bottom: 10px; animation: rgbText 7s linear infinite; }
.box h3 { font-family: 'Orbitron', sans-serif; font-size: 26px; margin-bottom: 4px; letter-spacing: 3px; animation: rgbText 7s linear infinite, glow 2.5s ease-in-out infinite; animation-delay: -1s, 0s; }
.box h6 { font-size: 15px; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 22px; color: #ddd; animation: rgbText 7s linear infinite; animation-delay: -2s; }

.input-container { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
input { width: 100%; padding: 14px 15px; background: transparent; border: 3px solid #ccc; color: #fff; font-size: 18px; text-align: center; outline: none; transition: 0.3s; font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }
input:focus { animation: rgbBorder 4s linear infinite; }
.input-container button { padding: 14px 18px; border: 4px solid #ddd; cursor: pointer; font-family: 'Orbitron', sans-serif; font-weight: 800; font-size: 16px; background: transparent; transition: 0.3s; letter-spacing: 3px; animation: rgbText 7s linear infinite, rgbBorder 4s linear infinite; }
.input-container button:hover { transform: scale(1.03); background: #f5f5f5; color: #000; }
.input-container button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.status-area { margin-top: 14px; min-height: 20px; }
.status-msg { font-size: 16px; padding: 14px 16px; margin-bottom: 10px; line-height: 1.8; display: none; letter-spacing: 0.5px; }
.status-msg.show { display: block; animation: fadeIn 0.3s ease; }
.status-msg.loading { background: transparent; border: 3px solid #4499ff; color: #99ccff; animation: pulse 1.5s infinite; }
.status-msg.success { background: transparent; border: 3px solid #00cc00; color: #88ff88; }
.status-msg.error   { background: transparent; border: 3px solid #cc0000; color: #ff8888; }
.status-msg.warn    { background: transparent; border: 3px solid #cc6600; color: #ffcc77; }
.status-msg b { letter-spacing: 1px; }

.code-display { margin-top: 14px; padding: 14px 10px; background: transparent; border: 4px solid #ff0000; font-family: 'Orbitron', sans-serif; font-size: 32px; display: none; align-items: center; justify-content: center; gap: 10px; cursor: pointer; animation: rgbBorder 4s linear infinite; flex-wrap: wrap; max-width: 100%; }
.code-display.show { display: flex; }
.code-display:hover { background: rgba(255,255,255,0.05); }
#copy-value { animation: rgbText 7s linear infinite, glow 2s ease-in-out infinite; font-weight: 900; letter-spacing: 4px; word-break: break-all; font-size: clamp(20px, 8vw, 32px); }
.code-hint { margin-top: 12px; font-size: 14px; color: #aaa; letter-spacing: 1px; line-height: 1.8; display: none; text-transform: uppercase; }
.code-hint.show { display: block; }
.spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid #ffffff33; border-top-color: #4499ff; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
</style>
</head>
<body>

<div id="videoBg">
  <video id="bgVideo" loop playsinline></video>
</div>

<div class="wrapper">

  <div class="header">
    <div class="logo-text">GULL-KHAN-MD</div>
    <div class="logo-sub">FREE BOT PAIR SYSTEM</div>
  </div>

  <div class="box" id="pairBox">
    <div class="box-icon">💖</div>
    <h3>GET NEW PAIR CODE</h3>
    <h6>Apna WhatsApp Number Dalo</h6>

    <div class="input-container">
      <input placeholder="EXAMPLE ❯ 923097497728" type="tel" id="pairNumber" maxlength="15">
      <button id="pairBtn" onclick="getPairCode()">GET PAIR CODE</button>
    </div>

    <div class="status-area">
      <div class="status-msg" id="pairStatus"></div>
      <div class="code-display" id="codeDisplay" onclick="copyCode()">
        <span id="copy-value">----</span>
      </div>
      <div class="code-hint" id="codeHint">
        📱 WhatsApp → Linked Devices → Link a Device → Link with Phone Number → Code dalo
      </div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
<script>
const BG_VIDEOS = [
  'https://files.catbox.moe/3lvxe3.mp4',
  'https://files.catbox.moe/j5reyh.mp4'
];

function playBgVideo() {
  let idx = parseInt(localStorage.getItem('bgVideoIndex') || '-1', 10);
  idx = (idx + 1) % BG_VIDEOS.length;
  localStorage.setItem('bgVideoIndex', idx);

  const url = BG_VIDEOS[idx];
  const vid = document.getElementById('bgVideo');
  vid.src = url;
  vid.muted = false;
  vid.volume = 1;
  vid.play().catch(() => {});
  document.getElementById('videoBg').classList.add('active');
}

function showStatus(id, msg, type) {
  const el = document.getElementById(id);
  el.className = `status-msg ${type} show`;
  el.innerHTML = msg;
}

async function getPairCode() {
  const raw = document.getElementById('pairNumber').value.trim();
  const number = raw.replace(/[^0-9]/g, '');

  if (!number || number.length < 10) {
    showStatus('pairStatus', '❌ Sahi number dalo — example: 923097497728', 'error');
    return;
  }

  playBgVideo();
  showStatus('pairStatus', '<span class="spinner"></span> Generating pair code...', 'loading');
  document.getElementById('pairBtn').disabled = true;
  document.getElementById('codeDisplay').className = 'code-display';
  document.getElementById('codeHint').className = 'code-hint';

  try {
    // API endpoint call mapping to Serverless route /api/code
    const { data } = await axios(`/api/code?number=${number}`);
    document.getElementById('pairBtn').disabled = false;

    if (data.code) {
      document.getElementById('copy-value').textContent = data.code;
      document.getElementById('copy-value').dataset.code = data.code;
      document.getElementById('codeDisplay').className = 'code-display show';
      document.getElementById('codeHint').className = 'code-hint show';
      showStatus('pairStatus', `<b>PAIR CODE READY</b><br>CLICK TO COPY`, 'success');
    } else {
      showStatus('pairStatus', `❌ Error: ${data.error || 'Failed to get code'}`, 'error');
    }
  } catch(err) {
    document.getElementById('pairBtn').disabled = false;
    showStatus('pairStatus', `❌ Server Error: Connection timed out or failed.`, 'error');
  }
}

async function copyCode() {
  const valueEl = document.getElementById('copy-value');
  const code = valueEl.dataset.code || valueEl.innerText.trim();
  if (!code || code === '----') return;

  try {
    await navigator.clipboard.writeText(code);
    valueEl.textContent = '✅ COPIED!';
    setTimeout(() => { valueEl.textContent = valueEl.dataset.code; }, 1500);
  } catch(e) {
    showStatus('pairStatus', `Code: ${code} (Copy manually)`, 'success');
  }
}
</script>
</body>
</html>
